name: Release

on:
    push:
        tags:
            - "v*" # 当推送以 v 开头的 tag 时触发，例如 v1.0.0

permissions:
    contents: write # 必须赋予写权限，否则无法创建和上传 Release 产物

jobs:
    create-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: taiki-e/create-gh-release-action@v1

    publish:
        name: Publish for ${{ matrix.os }}
        needs: create-release
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      artifact_name: plread-linux-amd64
                    - os: ubuntu-latest
                      target: aarch64-unknown-linux-musl
                      artifact_name: plread-linux-arm64
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact_name: plread-macos-amd64
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact_name: plread-macos-arm64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: plread-windows-amd64.exe

        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: taiki-e/upload-rust-binary-action@v1
              with:
                  # 需要在 Cargo.toml 的 [package] 中定义的 bin 名字
                  bin: plread
                  # 最终在 Release 页面显示的文件名
                  archive: ${{ matrix.artifact_name }}
                  target: ${{ matrix.target }}
                  # 自动引用当前的 Tag 创建/追加到 Release 页面
                  token: ${{ secrets.GITHUB_TOKEN }}
